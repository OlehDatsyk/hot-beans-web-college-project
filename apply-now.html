<!DOCTYPE html> <!-- Defines the document type as HTML5 -->
<html lang="en"> <!-- Root HTML element with English language -->
<head>
    <meta charset="UTF-8"> <!-- Sets character encoding -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Makes the site responsive on different devices -->
    <title>Apply Now: Hot Beans Web</title> <!-- Title shown in browser tab -->
    <link rel="stylesheet" href="style.css"> <!-- Links external CSS file -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Roboto&display=swap" rel="stylesheet"> <!-- Imports Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> <!-- Imports Font icons -->
    <link rel="icon" type="image/jpg" href="images/logo.jpg"> <!-- Website logo -->
</head>
<body> <!-- Main content of the webpage -->
<nav> <!-- Navigation bar -->
    <div class="logo">Hot Beans Web</div> <!-- Website logo -->
    <div class="hamburger"> <!-- Hamburger menu for mobile -->
        <span></span> <!-- Line 1 -->
        <span></span> <!-- Line 2 -->
        <span></span> <!-- Line 3 -->
    </div>
    <ul class="nav-links"> <!-- Navigation links -->
        <li><a href="index.html">Home</a></li> <!-- Home page -->
        <li><a href="about.html">About</a></li> <!-- About page -->
        <li><a href="meet-the-team.html">Meet the Team</a></li> <!-- Team page -->
        <li><a href="job-roles.html">Job Roles</a></li> <!-- Jobs page -->
        <li><a href="courses.html">Courses</a></li> <!-- Courses page -->
        <li><a href="apply-now.html" class="nav-apply">Apply Now</a></li> <!-- Current page (active page) -->
    </ul>
</nav>

    <div class="container"> <!-- Main container for form -->
        <h1 style="text-align:center">Apply Now</h1> <!-- Page heading -->
        <form id="applyForm"> <!-- Application form -->
            <label>Full Name</label> <!-- Label for name input -->
            <input type="text" required> <!-- Text input (required field) -->
            
            <label>Email</label> <!-- Label for email -->
            <input type="email" required> <!-- Email input with validation (required field) -->
            
            <label>Phone</label> <!-- Label for phone number -->
            <input type="tel" required> <!-- Telephone input (required field) -->
            
            <label>Skills</label> <!-- Label for skills -->
            <textarea rows="4" required></textarea> <!-- Text area for longer input (required field) -->
            
            <label>Portfolio Link</label> <!-- Label for portfolio -->
            <input type="url" required> <!-- URL input field (required field) -->

            <label>Upload CV</label> <!-- Label for file upload -->
            <input type="file" required> <!-- File upload input (required field) -->

            <button type="submit" class="btn-orange" style="border:none; cursor:pointer">Submit Application</button> <!-- Submit button -->
        </form>
        <div id="successMessage" style="display:none; text-align:center; margin-top:20px; color:var(--teal); font-weight:bold;">
            Thank You for Your Application!
        </div> <!-- Hidden success message shown after submission -->
    </div>

    <footer> <!-- Footer section -->
    <div class="footer-container">
        <div class="footer-left"> <!-- Left side -->
            <span class="footer-logo">Hot Beans</span> <!-- Footer logo -->
        </div>

        <div class="footer-center"> <!-- Centre -->
            <a href="mailto:careers@hotbeans.com" class="footer-mail" style="color: var(--deep-blue); font-weight: bold;" ><u>careers@hotbeans.com</u></a> <!-- Email contact -->
        </div>

        <div class="footer-right"> <!-- Right side -->
            <div class="social-icons"> <!-- Social media links -->
                <a href="https://www.youtube.com/" target="_blank"><i class="fab fa-youtube"></i></a> <!-- YouTube link -->
                <a href="https://www.tiktok.com/" target="_blank"><i class="fab fa-tiktok"></i></a> <!-- TikTok link -->
                <a href="https://web.telegram.org/k/" target="_blank"><i class="fab fa-telegram"></i></a> <!-- Telegram link -->
                <a href="https://en-gb.facebook.com/" target="_blank"><i class="fab fa-facebook"></i></a> <!-- Facebook link -->
                <a href="https://www.instagram.com/" target="_blank"><i class="fab fa-instagram"></i></a> <!-- Instagram link -->
            </div>
        </div>
        <p style="color: black;" position: absolute;>Made by Oleh Datsyk</p>
    </div>
</footer>
<script src="script.js"></script> <!-- Links JavaScript file -->
</body>
</html> <!-- End of document -->
